zh-CN:
  - title: "化繁为简"
    description: "用 AI 做简单易用的产品，科技简化手作流程，不把复杂留给用户。"
  - title: "手作更简单"
    description: "帮助用户更简单、更顺畅地完成自己的手工作品，每一步都更省力。"
  - title: "自信创造"
    description: "我们希望每个人不被专业门槛拦住，每个用户都能自信开始手工创造。"

en:
  - title: "AI Craft, made simple"
    description: "We use technology to build simple products—embedding AI and smart capabilities in clear, usable tools, not leaving complexity for users to deal with."
  - title: "Craft made simpler"
    description: "We help users finish their own handmade work more simply and smoothly—from pattern prep to knitting, with less effort at every step."
  - title: "Make with confidence"
    description: "We don't want professional barriers to stop anyone—we help users start handmade creation with confidence."
